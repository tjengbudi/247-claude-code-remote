# 247 Web self-host compose (Track 2 — local SQLite + local auth)
#
# Track 2 complete: web.db via WEB_DB_PATH, auth via WEB_AUTH_SECRET.
# No external database or auth provider required.

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "0.0.0.0:3001:3001"
    volumes:
      - web-data:/app/data
    environment:
      WEB_AUTH_SECRET: ${WEB_AUTH_SECRET:-}
      WEB_DB_PATH: /app/data/web.db
      NODE_ENV: production
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped

volumes:
  web-data:
